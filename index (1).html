<!DOCTYPE html>
<html lang="en" data-theme="void">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Before</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="void"]{
--bg:#000;--bg2:#0a0a0a;--bg3:#111;
--card:rgba(255,255,255,.03);--card-b:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.08);
--t100:#fff;--t80:rgba(255,255,255,.8);--t60:rgba(255,255,255,.6);
--t40:rgba(255,255,255,.4);--t20:rgba(255,255,255,.2);--t10:rgba(255,255,255,.1);
--glow:rgba(255,255,255,.12);--glow-s:rgba(255,255,255,.06);--dim:#888;--is-dark:1
}
[data-theme="slate"]{--bg:#0f0f12;--bg2:#14141a;--bg3:#22222c;--card:rgba(255,255,255,.04);--card-b:rgba(255,255,255,.07);--card-h:rgba(255,255,255,.1)}
[data-theme="frost"]{
--bg:#e8e8ec;--bg2:#f0f0f4;--bg3:#fafafe;
--card:rgba(0,0,0,.04);--card-b:rgba(0,0,0,.08);--card-h:rgba(0,0,0,.06);
--t100:#111;--t80:rgba(0,0,0,.8);--t60:rgba(0,0,0,.55);--t40:rgba(0,0,0,.35);
--t20:rgba(0,0,0,.15);--t10:rgba(0,0,0,.08);--glow:rgba(0,0,0,.08);--glow-s:rgba(0,0,0,.04);--dim:#666;--is-dark:0
}
[data-theme="solar"]{--bg:#0d0c0a;--bg2:#1c1b17;--bg3:#24231e;
--card:rgba(255,245,230,.04);--card-b:rgba(255,245,230,.07);--card-h:rgba(255,245,230,.1);
--t100:#f5f0e8;--t80:rgba(245,240,232,.8);--t60:rgba(245,240,232,.55);--t40:rgba(245,240,232,.35);
--t20:rgba(245,240,232,.15);--t10:rgba(245,240,232,.08);--glow:rgba(255,245,230,.1);--dim:#998}
[data-theme="matte"]{--bg:#161616;--bg2:#222;--bg3:#2a2a2a;--card:rgba(255,255,255,.035);--card-b:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.08)}

html{scroll-behavior:smooth}
body{width:100%;min-height:100vh;overflow-x:hidden;background:var(--bg);color:var(--t100);
font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;transition:background .5s,color .5s}
#root{min-height:100vh}
canvas.bgc{position:fixed;inset:0;z-index:0;pointer-events:none}

/* INTRO */
.intro{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
background:#000;transition:opacity 1.2s ease;overflow:hidden}
.intro.out{opacity:0;pointer-events:none}
.intro-center{text-align:center;position:relative;z-index:2}
.i-line{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.3rem,4.5vw,3rem);font-weight:300;
letter-spacing:-.01em;min-height:1.4em;display:flex;align-items:center;justify-content:center;
flex-wrap:wrap;white-space:nowrap;color:#fff}
.i-line .ch{display:inline-block;opacity:0;filter:blur(16px);transform:translateY(30px);
transition:opacity .8s ease,filter .9s ease,transform .8s ease}
.i-line.vis .ch{opacity:1;filter:blur(0);transform:translateY(0)}

.m100{font-size:clamp(5rem,16vw,11rem);font-weight:700;display:inline-block;
line-height:1;color:#fff;transition:text-shadow 1s,font-family 0s}
.m100.locked{text-shadow:0 0 60px rgba(255,255,255,.5),0 0 120px rgba(255,255,255,.2),
0 0 200px rgba(255,255,255,.08);font-family:'Space Grotesk',sans-serif!important}
.ray{position:absolute;top:50%;left:50%;width:2px;transform-origin:top center;
background:linear-gradient(to bottom,rgba(255,255,255,.3),transparent);opacity:0;transition:opacity 1.5s}

.g-before{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,7vw,4.5rem);font-weight:700;
letter-spacing:.3em;display:inline-block;margin-top:8px;color:#fff;position:relative}
.g-before.glitch{animation:glitch .6s steps(1)}
.g-before .echo{position:absolute;inset:0;opacity:0;filter:blur(8px);color:#fff;transition:opacity .5s}
.g-before.stable{text-shadow:0 0 40px rgba(255,255,255,.3),0 0 80px rgba(255,255,255,.1)}
.g-before.stable .echo{opacity:.15}
@keyframes glitch{
0%{clip-path:inset(0);transform:translate(0)}
12%{clip-path:inset(40% 0 20% 0);transform:translate(-5px,2px);text-shadow:4px 0 rgba(255,80,80,.5),-4px 0 rgba(80,80,255,.5)}
24%{clip-path:inset(10% 0 60% 0);transform:translate(4px,-1px);text-shadow:-3px 0 rgba(255,120,120,.3),3px 0 rgba(120,120,255,.3)}
36%{clip-path:inset(0);transform:translate(0);text-shadow:none}
50%{clip-path:inset(55% 0 15% 0);transform:translate(-3px) scaleX(1.03);text-shadow:3px 0 rgba(255,100,100,.4)}
62%{clip-path:inset(0);transform:scale(1.05);text-shadow:none}
75%,100%{clip-path:inset(0);transform:none;text-shadow:0 0 40px rgba(255,255,255,.3)}
}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.015) 2px,rgba(255,255,255,.015) 4px);
pointer-events:none;z-index:101;opacity:0;transition:opacity .5s}
.scanlines.vis{opacity:1}
.skip{position:fixed;bottom:30px;right:30px;z-index:200;background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-family:'Inter',sans-serif;
font-size:12px;padding:10px 22px;border-radius:100px;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px)}
.skip:hover{background:rgba(255,255,255,.12);color:#fff}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center}
.lw{display:flex;width:min(860px,92vw);min-height:440px;border-radius:24px;overflow:hidden;
background:var(--card);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
border:1px solid var(--card-b);box-shadow:0 8px 60px rgba(0,0,0,.5);position:relative;
animation:lIn .7s cubic-bezier(.34,1.56,.64,1)}
@keyframes lIn{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:none}}
.lw.shake{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.lw.glow{box-shadow:0 0 80px rgba(255,255,255,.15)!important;border-color:rgba(255,255,255,.2)!important}
.ll{flex:1;display:flex;align-items:center;justify-content:center;position:relative;
background:linear-gradient(135deg,rgba(255,255,255,.02),rgba(255,255,255,.005));overflow:hidden;min-height:180px}
.ll-100{font-family:'Space Grotesk',sans-serif;font-size:clamp(5rem,12vw,9rem);font-weight:700;
background:linear-gradient(135deg,var(--t100),var(--dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text;z-index:2;animation:fl 6s ease-in-out infinite;
filter:drop-shadow(0 0 30px var(--glow))}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ll::after{content:'';position:absolute;width:200%;height:200%;
background:radial-gradient(circle,var(--glow),transparent 60%);animation:lg 8s ease infinite;opacity:.4}
@keyframes lg{0%,100%{transform:translate(-30%,-30%)}50%{transform:translate(-20%,-20%)}}
.ll-bv{position:absolute;right:18px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;
font-family:'Space Grotesk',sans-serif;font-size:clamp(.9rem,1.8vw,1.4rem);font-weight:700;letter-spacing:.4em;
background:linear-gradient(180deg,var(--t40),var(--t10));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.lr{flex:1;padding:44px 36px;display:flex;flex-direction:column;justify-content:center}
.lr-t{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:600;margin-bottom:6px;
background:linear-gradient(135deg,var(--t100),var(--dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.lr-s{font-size:13px;color:var(--t40);margin-bottom:28px}
.ig{position:relative;margin-bottom:20px}
.ig input{width:100%;padding:16px 16px 8px;background:var(--card);border:1px solid var(--card-b);
border-radius:10px;color:var(--t100);font-size:15px;font-family:'Inter',sans-serif;outline:none;
transition:all .35s}
.ig input:focus{border-color:rgba(255,255,255,.25);background:var(--card-h);box-shadow:0 0 20px var(--glow-s)}
.ig input.err{border-color:rgba(180,60,60,.5)}
.ig label{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:14px;
color:var(--t40);pointer-events:none;transition:all .25s}
.ig input:focus+label,.ig input:not(:placeholder-shown)+label{
top:10px;transform:none;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t60)}
.ig .fl{position:absolute;bottom:0;left:50%;width:0;height:2px;
background:linear-gradient(90deg,transparent,var(--t40),transparent);transition:all .4s;border-radius:2px}
.ig input:focus~.fl{left:10%;width:80%}
.btn-p{width:100%;padding:15px;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));
border:1px solid var(--card-b);border-radius:10px;color:var(--t100);font-size:15px;font-weight:500;
font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;margin-top:6px}
.btn-p:hover{transform:scale(1.02) translateY(-1px);background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.08));
border-color:var(--t20);box-shadow:0 6px 24px var(--glow-s)}
.btn-p:active{transform:scale(.98)}
.btn-p .shine{position:absolute;top:0;left:-100%;width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:sh 4s infinite}
@keyframes sh{0%{left:-100%}40%,100%{left:100%}}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);
transform:scale(0);animation:rip .6s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4);opacity:0}}
.ls{position:absolute;width:1px;height:70px;background:linear-gradient(transparent,rgba(255,255,255,.07),transparent);
animation:stk 5s linear infinite;opacity:.4}
@keyframes stk{0%{transform:translateY(-80px);opacity:0}20%{opacity:.4}80%{opacity:.4}100%{transform:translateY(500px);opacity:0}}

/* LAYOUT */
.app-layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* FRIENDS SIDEBAR */
.fsb{width:260px;flex-shrink:0;background:rgba(0,0,0,.45);backdrop-filter:blur(24px);
border-right:1px solid var(--card-b);display:flex;flex-direction:column;position:fixed;
left:0;top:57px;bottom:0;z-index:20;overflow-y:auto;transition:transform .35s cubic-bezier(.4,0,.2,1)}
[data-theme="frost"] .fsb{background:rgba(255,255,255,.55)}
.fsb.hidden{transform:translateX(-100%)}
.fsb-hdr{padding:16px 16px 10px;border-bottom:1px solid var(--card-b)}
.fsb-title{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:600;
letter-spacing:.08em;text-transform:uppercase;color:var(--t40);margin-bottom:10px}
.fsb-tabs{display:flex;gap:4px}
.fsb-tab{flex:1;padding:6px 0;border:none;background:transparent;color:var(--t40);
font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s}
.fsb-tab.act{color:var(--t100);border-bottom-color:var(--t60)}

.friend-item{display:flex;align-items:center;gap:10px;padding:10px 16px;
cursor:pointer;transition:all .3s;border-bottom:1px solid var(--card-b)}
.friend-item:hover{background:var(--card-h)}
.friend-av{width:34px;height:34px;border-radius:50%;background:var(--card-h);
border:1px solid var(--card-b);display:flex;align-items:center;justify-content:center;
font-size:12px;font-weight:700;flex-shrink:0;color:var(--t60)}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:12px;font-weight:600;color:var(--t80);margin-bottom:2px}
.friend-meta{font-size:10px;color:var(--t40);display:flex;align-items:center;gap:5px}
.friend-streak{color:var(--t60);font-size:9px}

.add-friend{margin:10px 16px}
.add-friend input{width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--card-b);
border-radius:8px;color:var(--t100);font-size:11px;font-family:'Inter',sans-serif;outline:none;
transition:border-color .3s}
.add-friend input:focus{border-color:var(--t20)}
.add-friend button{width:100%;margin-top:6px;padding:8px;background:var(--card-h);border:1px solid var(--card-b);
border-radius:8px;color:var(--t60);font-size:11px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.add-friend button:hover{border-color:var(--t20);color:var(--t100)}

.compare-panel{padding:12px 16px}
.compare-title{font-size:10px;color:var(--t40);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.compare-friend{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
border:1px solid var(--card-b);margin-bottom:6px;cursor:pointer;transition:all .3s}
.compare-friend:hover{background:var(--card-h)}
.compare-friend.sel{background:var(--card-h);border-color:var(--t20)}
.compare-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--card-b);
display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .3s}
.compare-friend.sel .compare-check{background:var(--t20);border-color:var(--t40)}
.compare-table{margin-top:12px;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--card-b)}
.ct-row{display:flex;padding:8px 12px;border-bottom:1px solid var(--card-b);font-size:11px;align-items:center}
.ct-row:last-child{border:none}
.ct-stat{flex:1;color:var(--t40)}
.ct-you{width:40px;text-align:right;font-weight:600;color:var(--t80)}
.ct-them{width:40px;text-align:right;font-weight:600;color:var(--t60)}
.ct-head{background:var(--card-h)}
.ct-head .ct-stat{color:var(--t20);font-size:9px;text-transform:uppercase;letter-spacing:.08em}
.ct-head .ct-you,.ct-head .ct-them{color:var(--t40);font-size:9px}
.ct-win{color:var(--t100)!important}

/* MAIN CONTENT */
.main-content{flex:1;min-height:100vh;transition:margin-left .35s cubic-bezier(.4,0,.2,1)}
.main-content.sidebar-open{margin-left:260px}

/* DASHBOARD */
.dash{position:relative;z-index:1;min-height:100vh}
.dh{position:sticky;top:0;z-index:30;padding:13px 22px;display:flex;align-items:center;
justify-content:space-between;background:rgba(0,0,0,.65);backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--card-b);transition:background .5s}
[data-theme="frost"] .dh{background:rgba(255,255,255,.75)}
.d-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.06em;
background:linear-gradient(135deg,var(--t100),var(--dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.hr{display:flex;align-items:center;gap:10px}
.av{width:32px;height:32px;border-radius:50%;background:var(--card-h);border:1px solid var(--card-b);
display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;
overflow:hidden;transition:all .3s;color:var(--t60)}
.av:hover{border-color:var(--t20)}
.av img{width:100%;height:100%;object-fit:cover}
.bsm{background:none;border:1px solid var(--card-b);color:var(--t40);font-size:11px;
padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
.bsm:hover{border-color:var(--t20);color:var(--t100)}
.friends-toggle{background:none;border:1px solid var(--card-b);color:var(--t40);font-size:11px;
padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;
display:flex;align-items:center;gap:5px}
.friends-toggle:hover,.friends-toggle.act{border-color:var(--t20);color:var(--t100);background:var(--card)}
.db{max-width:1080px;margin:0 auto;padding:28px 18px 120px}

.pa{display:flex;gap:28px;margin-bottom:32px;flex-wrap:wrap;align-items:center;justify-content:center}
.rw{position:relative;width:160px;height:160px;flex-shrink:0}
.rw svg{width:100%;height:100%;transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--card-b);stroke-width:6}
.rfg{fill:none;stroke:url(#rgrad);stroke-width:6;stroke-linecap:round;
transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 6px var(--glow))}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rpct{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;color:var(--t100)}
.rlbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t40);margin-top:2px}
.rglow{position:absolute;inset:18px;border-radius:50%;background:radial-gradient(circle,var(--glow-s),transparent 70%);
animation:rpulse 3s ease-in-out infinite}
@keyframes rpulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.5;transform:scale(1.04)}}
.xa{flex:1;min-width:240px}
.xlv{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;margin-bottom:7px;color:var(--t80)}
.xlv span{font-size:.75rem;color:var(--t40);font-weight:400;margin-left:8px}
.xt{width:100%;height:8px;background:var(--card-b);border-radius:100px;overflow:hidden}
.xf{height:100%;background:linear-gradient(90deg,var(--t20),var(--t60));border-radius:100px;
transition:width 1s cubic-bezier(.4,0,.2,1)}
.xs{font-size:11px;color:var(--t20);margin-top:5px}
.stk-b{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--card-b);
border-radius:100px;padding:7px 16px;font-size:13px;margin-top:12px;color:var(--t60)}
.flm{display:inline-block;animation:flm 1s ease infinite}
@keyframes flm{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.2) rotate(3deg)}}

.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:28px}
.sc{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:22px 18px;
transition:all .35s;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;inset:-1px;border-radius:inherit;
background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 50%);pointer-events:none}
.sc:hover{background:var(--card-h);border-color:var(--t20);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.3)}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t40);margin-bottom:7px}
.sv{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;
background:linear-gradient(135deg,var(--t100),var(--dim));-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.ss{font-size:10px;color:var(--t20);margin-top:3px}

/* CALENDAR */
.cal-wrap{background:var(--card);border:1px solid var(--card-b);border-radius:14px;margin-bottom:28px;overflow:hidden}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
border-bottom:1px solid var(--card-b)}
.cal-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:var(--t80)}
.cal-nav{display:flex;gap:8px}
.cal-nav button{width:28px;height:28px;border-radius:50%;border:1px solid var(--card-b);
background:transparent;color:var(--t40);cursor:pointer;transition:all .3s;
display:flex;align-items:center;justify-content:center;font-size:13px}
.cal-nav button:hover{border-color:var(--t20);color:var(--t100);background:var(--card-h)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.cal-dow{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--t20);
text-align:center;padding:10px 0;border-bottom:1px solid var(--card-b)}
.cal-day{min-height:72px;padding:8px;border-right:1px solid var(--card-b);border-bottom:1px solid var(--card-b);
position:relative;cursor:pointer;transition:background .2s}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--card-h)}
.cal-day.today{background:rgba(255,255,255,.04)}
.cal-day.today .cal-dn{background:var(--t100);color:var(--bg);border-radius:50%;
width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-day.other-month .cal-dn{color:var(--t20)}
.cal-day.has-done{background:rgba(255,255,255,.02)}

},[data.goals,filter]);

function persist(nd){onUpdate(nd)}

// Close profile on outside click
useEffect(function(){

return function(){document.removeEventListener('click',handler)};
},[showProfile]);

useEffect(function(){
if(data.goals.length>0&&new Date(data.we).getTime()<Date.now()){
var inc=data.goals.filter(function(g){return !g.done});
var pool=inc.length>0?inc:data.goals;
var idx=data.goals.indexOf(pool[Math.floor(Math.random()*pool.length)]);
persist(Object.assign({},data,{wgi:idx,we:new Date(Date.now()+7*864e5).toISOString()}));

function toggleGoal(id,e){
var goal=data.goals.find(function(g){return g.id===id});if(!goal)return;
var wasDone=goal.done;
var newGoals=data.goals.map(function(g){
return g.id===id?Object.assign({},g,{done:!g.done,doneAt:!g.done?new Date().toISOString():null}):g
});
var xpD=wasDone?-XPG:XPG;
var nd=Object.assign({},data,{goals:newGoals,xp:Math.max(0,data.xp+xpD)});
if(!wasDone){
var newBadges=BDG.filter(function(b){return nd.ub.indexOf(b.id)===-1&&b.ck(nd.goals,nd.streak,nd.xp)});
if(newBadges.length>0){
nd=Object.assign({},nd,{ub:nd.ub.concat(newBadges.map(function(b){return b.id}))});
setPopB(newBadges[0]);setTimeout(function(){setPopB(null)},2000);
}
var rect=e.currentTarget.getBoundingClientRect();
setCfd({x:rect.left+rect.width/2,y:rect.top+rect.height/2,key:Date.now()});
setXbd({x:rect.left+rect.width/2,y:rect.top,amt:XPG,key:Date.now()});
}
persist(nd);
}

function deleteGoal(id){
var goal=data.goals.find(function(g){return g.id===id});
var newGoals=data.goals.filter(function(g){return g.id!==id});
var xpD=goal&&goal.done?-XPG:0;
var nd=Object.assign({},data,{goals:newGoals,xp:Math.max(0,data.xp+xpD)});
if(nd.wgi!=null&&nd.wgi>=newGoals.length)nd.wgi=newGoals.length>0?0:null;
persist(nd);
}

function addGoals(texts){
var nextId=data.goals.length>0?Math.max.apply(null,data.goals.map(function(g){return g.id}))+1:1;
var cap=100-data.goals.length;
var ng=texts.slice(0,cap).map(function(t,i){return{id:nextId+i,text:t,done:false,doneAt:null,photo:null}});
var nd=Object.assign({},data,{goals:data.goals.concat(ng)});
if(nd.wgi==null&&nd.goals.length>0){
var inc=nd.goals.filter(function(g){return !g.done});
var pool=inc.length>0?inc:nd.goals;
nd.wgi=nd.goals.indexOf(pool[Math.floor(Math.random()*pool.length)]);
}
persist(nd);
}

function setPhoto(id,src){persist(Object.assign({},data,{goals:data.goals.map(function(g){return g.id===id?Object.assign({},g,{photo:src}):g})}))}
function rmPhoto(id){persist(Object.assign({},data,{goals:data.goals.map(function(g){return g.id===id?Object.assign({},g,{photo:null}):g})}))}

function onAvFile(e){
var f=e.target.files&&e.target.files[0];if(!f)return;
var reader=new FileReader();reader.onload=function(ev){persist(Object.assign({},data,{av:ev.target.result}))};
reader.readAsDataURL(f);e.target.value='';
}

function handleLogin(username){var nd=mk(username);setData(nd);sv(nd);setPhase('dashboard')}

function handleLogout(){localStorage.removeItem(SK);setData(null);setPhase('login')}
var currentTheme=(data&&data.th)||'void';
return React.createElement(TP,{init:currentTheme},

function AppInner(props){
